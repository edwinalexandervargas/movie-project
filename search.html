<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search</title>
    <script src="app.js" defer></script>
    <script
      src="https://kit.fontawesome.com/decd14f2d7.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="nav">
      <img
        src="./assets/movie-watching-png-entertainment-illustration-transparent-background_53876-1043784.avif"
        class="nav__img"
        alt=""
      />
      <ul class="nav__link--list">
        <li class="nav__link">
          <a href="" class="">Home</a>
        </li>
        <li class="nav__link">
          <a href="" class="">Search</a>
        </li>
        <li class="nav__link--primary">
          <a href="" class="">Contact</a>
        </li>
      </ul>
    </div>

    <header class="search__header">
      <div class="container">
        <div class="row">
          <h1>Browse our Movies</h1>
          <div class="input-group">
            <input
              type="text"
              class="header__search"
              placeholder="Search Movie"
            />
            <i class="fa-solid fa-magnifying-glass header__icon"></i>
          </div>
        </div>
      </div>
    </header>

    <main id="movies__main">
      <section>
        <div class="container">
          <div class="row">
            <div class="movies__header">
              <h2 class="header__title">All Movies</h2>
              <select name="filter" id="">
                <option value="">Ratings</option>
                <option value="">High to Low</option>
                <option value="">Low to High</option>
              </select>
            </div>
            <div class="movies__loading">
              <i class="fas fa-spinner movies__loading--spinner"></i>
            </div>
            <div class="movies"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <div class="row row__column">
          <a href="#">
            <figure>
              <img
                src="./assets/movie-watching-png-entertainment-illustration-transparent-background_53876-1043784.avif"
                class="footer__logo--img"
                alt=""
              />
            </figure>
          </a>
          <div class="footer__list">
            <a href="#" class="footer__link">Home</a>
            <a href="#" class="footer__link">About</a>
            <a href="#" class="footer__link">Books</a>
            <a href="#" class="footer__link">Contact</a>
          </div>
          <div class="footer__copyright">Copyright &copy 2026 Movies</div>
        </div>
      </div>
    </footer>
  </body>
</html>
